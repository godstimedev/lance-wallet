services:
 postgres:
  image: postgres:15-alpine
  container_name: wallet_postgres
  environment:
   POSTGRES_USER: walletuser
   POSTGRES_PASSWORD: walletpass
   POSTGRES_DB: wallet
  ports:
   - '5432:5432'
  volumes:
   - pgdata:/var/lib/postgresql/data
  healthcheck:
   test: ['CMD-SHELL', 'pg_isready -U walletuser']
   interval: 10s
   timeout: 5s
   retries: 5

 backend:
  build: ./backend
  container_name: wallet-api
  ports:
   - '4000:4000'
  environment:
   - DATABASE_URL=postgresql://walletuser:walletpass@postgres:5432/wallet
   - NODE_ENV=production
   - PORT=4000
   - JWT_SECRET=wallet_super_secret_key_2026
  depends_on:
   postgres:
    condition: service_healthy

 frontend:
  build: ./frontend
  container_name: wallet-web
  ports:
   - '3000:80'
  environment:
   - VITE_API_URL=http://localhost:4000/api
  depends_on:
   - backend

volumes:
 pgdata:
